workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # DEV workflow — triggered on every push to any branch
  # ─────────────────────────────────────────────────────────────────────────────
  sridhar-dev:
    name: Sridhar Car Wash Dev Build
    max_build_duration: 30
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
      cancel_previous_builds: true

    environment:
      flutter: stable
      vars:
        BASE_URL: https://dev.api.sridharcarwash.com/api/v1
        WS_BASE_URL: wss://dev.api.sridharcarwash.com/ws
        STRIPE_PK: $DEV_STRIPE_PK
        MAPS_KEY: $MAPS_KEY
        SENTRY_DSN: $SENTRY_DSN
        SMS_ENABLED: "false"

    scripts:
      - name: Install deps
        script: flutter pub get
      - name: Generate code
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Run tests
        script: flutter test
      - name: Build debug APK
        script: |
          flutter build apk --debug \
            -t lib/main_dev.dart \
            --dart-define=BASE_URL=$BASE_URL \
            --dart-define=WS_BASE_URL=$WS_BASE_URL \
            --dart-define=STRIPE_PK=$STRIPE_PK \
            --dart-define=MAPS_KEY=$MAPS_KEY \
            --dart-define=SMS_ENABLED=$SMS_ENABLED

    artifacts:
      - build/app/outputs/apk/debug/*.apk

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGING workflow — triggered on push to staging branch
  # ─────────────────────────────────────────────────────────────────────────────
  sridhar-staging:
    name: Sridhar Car Wash Staging Build
    max_build_duration: 45
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: staging
          include: true
          source: true

    environment:
      flutter: stable
      android_signing:
        - sridhar_keystore
      vars:
        BASE_URL: https://staging.api.sridharcarwash.com/api/v1
        WS_BASE_URL: wss://staging.api.sridharcarwash.com/ws
        STRIPE_PK: $STAGING_STRIPE_PK
        MAPS_KEY: $MAPS_KEY
        SENTRY_DSN: $SENTRY_DSN
        SMS_ENABLED: "true"

    scripts:
      - name: Install deps
        script: flutter pub get
      - name: Generate code
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Run tests
        script: flutter test
      - name: Build staging APK
        script: |
          flutter build apk --release \
            -t lib/main_staging.dart \
            --dart-define=BASE_URL=$BASE_URL \
            --dart-define=WS_BASE_URL=$WS_BASE_URL \
            --dart-define=STRIPE_PK=$STRIPE_PK \
            --dart-define=MAPS_KEY=$MAPS_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=SMS_ENABLED=$SMS_ENABLED

    artifacts:
      - build/app/outputs/apk/release/*.apk
      - build/app/outputs/bundle/release/*.aab

    publishing:
      slack:
        channel: '#builds'
        notify_on_build_start: true
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # PRODUCTION workflow — triggered on push to main / tag v*
  # ─────────────────────────────────────────────────────────────────────────────
  sridhar-prod:
    name: Sridhar Car Wash Production Build
    max_build_duration: 60
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    environment:
      flutter: stable
      android_signing:
        - sridhar_keystore
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sridharcarwash.app
      vars:
        BASE_URL: https://api.sridharcarwash.com/api/v1
        WS_BASE_URL: wss://api.sridharcarwash.com/ws
        STRIPE_PK: $PROD_STRIPE_PK
        MAPS_KEY: $MAPS_KEY
        SENTRY_DSN: $SENTRY_DSN
        SMS_ENABLED: "true"

    scripts:
      - name: Install deps
        script: flutter pub get
      - name: Generate code
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Run tests
        script: flutter test
      - name: Build Android AAB
        script: |
          flutter build appbundle --release \
            -t lib/main_prod.dart \
            --dart-define=BASE_URL=$BASE_URL \
            --dart-define=WS_BASE_URL=$WS_BASE_URL \
            --dart-define=STRIPE_PK=$STRIPE_PK \
            --dart-define=MAPS_KEY=$MAPS_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            -t lib/main_prod.dart \
            --dart-define=BASE_URL=$BASE_URL \
            --dart-define=WS_BASE_URL=$WS_BASE_URL \
            --dart-define=STRIPE_PK=$STRIPE_PK \
            --dart-define=MAPS_KEY=$MAPS_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/ios/ipa/*.ipa
      - flutter_drive.log

    publishing:
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
      slack:
        channel: '#releases'
        notify:
          success: true
          failure: true
